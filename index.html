<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mubra AI - ChemSupport Pro</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f6;
            --chat-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: #e9ecef;
            color: var(--text-color);
            border-bottom-left-radius: 2px;
        }

        .preview-container {
            padding: 10px;
            display: none;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        #imagePreview {
            max-width: 100px;
            border-radius: 5px;
            display: block;
        }

        .input-area {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #ddd;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .file-label {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<header>Mubra AI - ChemSupport Pro</header>

<div id="chat-container">
    <div class="message ai-message">ආයුබෝවන්! මම Mubra AI. මට පුළුවන් ඔයාගේ Chemistry සහ Maths ගැටලු විසඳන්න. පින්තූරයක් හෝ ලින්ක් එකක් එවන්නත් පුළුවන්.</div>
</div>

<div class="preview-container" id="previewBox">
    <img id="imagePreview" src="" alt="Preview">
    <button onclick="clearImage()" style="font-size: 12px; margin-top: 5px;">මකන්න</button>
</div>

<div class="input-area">
    <label for="imageInput" class="file-label">📎</label>
    <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="previewFile()">
    
    <input type="text" id="userInput" placeholder="ප්‍රශ්නය මෙතන ටයිප් කරන්න හෝ Link එකක් දාන්න...">
    <button class="btn" onclick="sendMessage()">Send</button>
</div>

<script>
    // ⚠️ ඔබේ API Key එක මෙතනට ඇතුළත් කරන්න
    const GEMINI_API_KEY = 'AIzaSyAZ8SRcSLLEwY-Ubsgh5nC2oQA7CJRNRa4'; 

    async function sendMessage() {
        const userInput = document.getElementById('userInput');
        const imageInput = document.getElementById('imageInput');
        const chatContainer = document.getElementById('chat-container');
        const message = userInput.value.trim();
        const file = imageInput.files[0];

        if (!message && !file) return;

        // User Message පෙන්වීම
        appendMessage(message || "පින්තූරයක් එව්වා...", 'user-message');
        userInput.value = '';
        clearImage();

        // AI එකට දත්ත සූදානම් කිරීම
        let prompt = "You are Mubra AI, a genius Chemistry and Maths tutor for Advanced Level students. Answer in Sinhala when possible. ";
        if (message.includes("http")) {
            prompt += "Analyze this link and provide a clear note: ";
        }
        prompt += message;

        const requestBody = {
            contents: [{
                parts: [{ text: prompt }]
            }]
        };

        if (file) {
            const base64Data = await toBase64(file);
            requestBody.contents[0].parts.push({
                inline_data: {
                    mime_type: file.type,
                    data: base64Data.split(',')[1]
                }
            });
        }

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            appendMessage(aiResponse, 'ai-message');
        } catch (error) {
            appendMessage("කණගාටුයි, සම්බන්ධතාවයේ දෝෂයක්. කරුණාකර නැවත උත්සාහ කරන්න.", 'ai-message');
        }
    }

    function appendMessage(text, className) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function previewFile() {
        const preview = document.getElementById('imagePreview');
        const previewBox = document.getElementById('previewBox');
        const file = document.getElementById('imageInput').files[0];
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            previewBox.style.display = 'block';
        }

        if (file) { reader.readAsDataURL(file); }
    }

    function clearImage() {
        document.getElementById('imageInput').value = "";
        document.getElementById('previewBox').style.display = 'none';
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>

</body>
</html>
